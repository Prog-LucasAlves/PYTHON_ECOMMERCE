<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin · Melhores Ofertas</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://www.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://www.gstatic.com; font-src 'self' https://cdnjs.cloudflare.com data:; upgrade-insecure-requests">
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="admin-page">

  <!-- LOGIN OVERLAY -->
    <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <div class="logo" style="justify-content:center;margin-bottom:12px"><img src="img/logo-01-icon.svg" alt="Melhores Ofertas" class="site-logo site-logo-icon"/></div>
      <h2>Painel Admin</h2>
      <input type="email" id="loginEmail" placeholder="E-mail" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')doLogin()"/>
      <input type="password" id="loginPassword" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button onclick="doLogin()" class="btn-primary">Entrar</button>
      <p id="loginError" style="color:red;margin-top:8px;display:none">E-mail ou senha incorretos.</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none">
    <header>
      <div class="header-inner">
        <div class="logo">
          <img src="img/logo-01-icon.svg" alt="Melhores Ofertas" class="site-logo site-logo-icon"/>
        </div>
        <div class="header-actions">
          <a href="index.html" class="btn-secondary"><i class="fas fa-eye"></i> Ver site</a>
          <button onclick="doLogout()" class="btn-admin"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <!-- DASHBOARD -->
      <section class="admin-form-card" style="padding:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <h2><i class="fas fa-chart-bar"></i> Dashboard</h2>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn-secondary" onclick="triggerCSVImport()">
              <i class="fas fa-file-csv"></i> Importar CSV
            </button>
            <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="importCSV(event)"/>
          </div>
        </div>
        <div id="dashboardSection"></div>
      </section>

      <!-- FORM -->
      <section class="admin-form-card">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Adicionar Produto</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
          <input type="hidden" id="editId"/>
          <div class="form-grid">
            <div class="form-group">
              <label>Nome do Produto *</label>
              <input type="text" id="prodName" placeholder="Ex: Fone Bluetooth JBL" required/>
            </div>
            <div class="form-group">
              <label>Categoria *</label>
              <select id="prodCategory" required>
                <option value="">Selecione...</option>
                <optgroup label="Moda">
                  <option value="roupas-fem">👗 Roupas Femininas</option>
                  <option value="roupas-masc">👔 Roupas Masculinas</option>
                  <option value="sapatos">👟 Sapatos</option>
                  <option value="moda">💍 Acessórios de Moda</option>
                </optgroup>
                <optgroup label="Tecnologia">
                  <option value="celulares">📱 Celulares e Dispositivos</option>
                  <option value="eletronicos">💻 Eletrônicos</option>
                  <option value="computadores">🖥️ Computadores e Acessórios</option>
                  <option value="jogos">🎮 Jogos e Consoles</option>
                  <option value="cameras">📷 Câmeras e Drones</option>
                  <option value="audio">🎧 Áudio</option>
                </optgroup>
                <optgroup label="Casa e Vida">
                  <option value="eletrodom">🏠 Eletrodomésticos</option>
                  <option value="casa">🏡 Casa e Construção</option>
                  <option value="alimentos">🍎 Alimentos e Bebidas</option>
                </optgroup>
                <optgroup label="Saúde e Bem-estar">
                  <option value="beleza">💄 Beleza</option>
                  <option value="saude">💊 Saúde</option>
                  <option value="esporte">⚽ Esportes e Lazer</option>
                </optgroup>
                <optgroup label="Família">
                  <option value="bebes">👶 Mãe e Bebê</option>
                  <option value="brinquedos">🧸 Brinquedos e Hobbies</option>
                  <option value="animais">🐾 Animais Domésticos</option>
                </optgroup>
                <optgroup label="Veículos e Outros">
                  <option value="automoveis">🚗 Automóveis</option>
                  <option value="livros">📚 Livros e Revistas</option>
                  <option value="outros">✨ Outros</option>
                </optgroup>
              </select>
            </div>
            <div class="form-group">
              <label>Preço Original (R$)</label>
              <input type="number" id="prodOriginalPrice" placeholder="99.90" step="0.01" min="0"/>
            </div>
            <div class="form-group">
              <label>Preço com Desconto (R$) *</label>
              <input type="number" id="prodPrice" placeholder="49.90" step="0.01" min="0" required/>
            </div>
            <div class="form-group full-width">
              <label>Link de Afiliado Shopee *</label>
              <input type="url" id="prodLink" placeholder="https://s.shopee.com.br/..." required/>
            </div>

            <!-- MULTI-IMAGE SECTION -->
            <div class="form-group full-width">
              <label>🖼️ Imagens do Produto * <span style="font-weight:400;color:#aaa">(adicione quantas quiser)</span></label>
              <div id="imagesList"></div>
              <button type="button" class="btn-add-image" onclick="addImageField()">
                <i class="fas fa-plus"></i> Adicionar Imagem
              </button>
            </div>

            <!-- IMAGE PREVIEWS -->
            <div class="form-group full-width" id="imagesPreviewBox" style="display:none">
              <label>Preview das Imagens</label>
              <div id="imagesPreviewStrip" class="admin-preview-strip"></div>
            </div>

            <!-- VIDEO SECTION -->
            <div class="form-group full-width">
              <label>🎬 Vídeo do Produto <span style="font-weight:400;color:#aaa">(opcional · YouTube ou link direto)</span></label>
              <input type="text" id="prodVideo" placeholder="https://www.youtube.com/watch?v=... ou link .mp4" oninput="previewVideo()"/>
              <div id="videoPreviewBox" style="display:none;margin-top:8px">
                <div id="videoPreviewContent"></div>
              </div>
            </div>
            <div class="form-group full-width">
              <label>Descrição curta</label>
              <textarea id="prodDesc" rows="2"><strong>Frete grátis</strong> com cupom - Produto original - Entrega rápida - <br>Preço promocional sujeito a alteração sem aviso prévio.</textarea>
              <small style="color:#aaa">Você pode editar esse texto antes de salvar.</small>
            </div>
            <div class="form-group">
              <label>⭐ Avaliação (1.0 – 5.0)</label>
              <input type="number" id="prodRating" placeholder="Ex: 4.5" step="0.1" min="1" max="5"/>
            </div>
            <div class="form-group">
              <label>🛒 Vendidos (número)</label>
              <input type="text" id="prodSoldCount" placeholder="Ex: 4.000" inputmode="numeric"/>
            </div>
            <div class="form-group">
              <label>Destaque?</label>
              <label class="toggle">
                <input type="checkbox" id="prodFeatured"/>
                <span class="slider"></span>
                <span class="toggle-label">Produto em destaque</span>
              </label>
            </div>
            <div class="form-group">
              <label>⏰ Oferta até (data/hora)</label>
              <input type="datetime-local" id="prodCountdown"/>
              <small style="color:#aaa">Deixe em branco se não tiver prazo.</small>
            </div>
            <div class="form-group">
              <label>🗓️ Publicar em (agendar)</label>
              <input type="datetime-local" id="prodPublishDate"/>
              <small style="color:#aaa">Produto ficará oculto até essa data/hora.</small>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="submitBtn"><i class="fas fa-save"></i> Salvar Produto</button>
            <button type="button" class="btn-secondary" onclick="resetForm()"><i class="fas fa-times"></i> Cancelar</button>
          </div>
          <!-- Compartilhar após salvar -->
          <div id="shareAfterSave" style="display:none; margin-top:12px; padding:12px 14px; background:#e8f5e9; border-radius:8px; border:1.5px solid #a5d6a7; display:flex!important; align-items:center; gap:12px; flex-wrap:wrap;">
            <span style="font-size:.88rem; color:#2e7d32; font-weight:600;"><i class="fas fa-check-circle"></i> Produto salvo!</span>
            <button id="btnShareTgAfterSave" class="btn-tg-share" style="display:inline-flex; align-items:center; gap:6px; padding:7px 16px; width:auto; height:auto; font-size:.82rem; font-weight:600;" onclick="">
              <i class="fab fa-telegram-plane"></i> Compartilhar no Telegram
            </button>
            <button onclick="document.getElementById('shareAfterSave').style.display='none'" style="background:none;border:none;color:#888;cursor:pointer;font-size:1rem; margin-left:auto;"><i class="fas fa-times"></i></button>
          </div>
        </form>
      </section>

      <!-- LISTA DE PRODUTOS -->
      <section class="admin-list-card">
        <div class="list-header">
          <h2><i class="fas fa-list"></i> Produtos Cadastrados <span id="prodCount" class="badge">0</span></h2>
          <input type="text" id="adminSearch" placeholder="🔍 Filtrar..." oninput="renderAdminList()"/>
        </div>
        <div id="adminProductList" class="admin-list"></div>
      </section>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="js/admin.js"></script>
</body>
</html>
