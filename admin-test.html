<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Admin (Teste) · Ofertas Shopee</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="admin-page">

  <!-- ADMIN PANEL (SEM LOGIN) -->
  <div id="adminPanel">
    <header>
      <div class="header-inner">
        <div class="logo">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Shopee.svg/200px-Shopee.svg.png" alt="Shopee" height="32"/>
          <span>Painel Admin (TESTE - localStorage)</span>
        </div>
        <button class="btn-logout" onclick="alert('Teste: Sem logout')"><i class="fas fa-sign-out-alt"></i> Sair</button>
      </div>
    </header>

    <main>
      <!-- FORM -->
      <section class="admin-form-card">
        <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Adicionar Produto (TESTE)</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
          <div class="form-grid">
            <div class="form-group">
              <label>Nome do Produto *</label>
              <input type="text" id="prodName" placeholder="Ex: Fone Bluetooth" required/>
            </div>
            <div class="form-group">
              <label>Preço (R$) *</label>
              <input type="number" id="prodPrice" placeholder="49.90" step="0.01" required/>
            </div>
            <div class="form-group">
              <label>Preço Original (R$)</label>
              <input type="number" id="prodOriginalPrice" placeholder="89.90" step="0.01"/>
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <select id="prodCategory">
                <option value="outros">Outros</option>
                <option value="eletronicos">Eletrônicos</option>
                <option value="moda">Moda</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label>Link do Produto (Shopee) *</label>
              <input type="text" id="prodLink" placeholder="https://s.shopee.com.br/..." required/>
            </div>
            <div class="form-group full-width">
              <label>URL da Imagem (copie e cole) *</label>
              <div id="imagesList"></div>
              <button type="button" class="btn-secondary" onclick="addImageField()">+ Adicionar Imagem</button>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="submitBtn"><i class="fas fa-save"></i> Salvar Produto</button>
            <button type="button" class="btn-secondary" onclick="resetForm()"><i class="fas fa-redo"></i> Limpar</button>
          </div>
        </form>
      </section>

      <!-- LISTA -->
      <section class="admin-list-card">
        <div class="list-header">
          <h2><i class="fas fa-list"></i> Produtos <span id="prodCount" class="badge">0</span></h2>
        </div>
        <div id="adminProductList" class="admin-list"></div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script>
// Simple admin without Firebase - just localStorage
const STORAGE_KEY = 'shopee_products';

let products = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let imageCount = 0;
let editingId = null;

console.log('[INIT] Loaded', products.length, 'products');

function addImageField(url = '') {
  const list = document.getElementById('imagesList');
  const id = imageCount++;
  const div = document.createElement('div');
  div.style = 'margin:8px 0;display:flex;gap:8px;align-items:center';
  div.innerHTML = `
    <input type="text" class="img-url-input" value="${url}" placeholder="https://..." style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px"/>
    <button type="button" onclick="this.parentElement.remove()" style="background:red;color:white;border:none;padding:8px 12px;border-radius:4px;cursor:pointer">✕</button>
  `;
  list.appendChild(div);
}

function getImageUrls() {
  return Array.from(document.querySelectorAll('.img-url-input')).map(inp => inp.value.trim()).filter(Boolean);
}

function saveProduct(e) {
  e.preventDefault();
  const images = getImageUrls();
  if (!images.length) { alert('Adicione pelo menos uma imagem.'); return; }

  const product = {
    id: editingId || Date.now(),
    name: document.getElementById('prodName').value.trim(),
    category: document.getElementById('prodCategory').value,
    originalPrice: parseFloat(document.getElementById('prodOriginalPrice').value) || null,
    price: parseFloat(document.getElementById('prodPrice').value),
    link: document.getElementById('prodLink').value.trim(),
    images,
  };

  if (editingId) {
    const idx = products.findIndex(p => p.id === editingId);
    if (idx !== -1) products[idx] = product;
  } else {
    products.unshift(product);
  }

  saveToStorage();
  resetForm();
  renderList();
  showToast('Produto salvo! ✅');
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    console.log('[SAVE] ✅ Saved', products.length, 'products to localStorage');
  } catch (e) {
    console.error('[SAVE] ❌ Error:', e.message);
    alert('Erro ao salvar: ' + e.message);
  }
}

function deleteProduct(id) {
  if (!confirm('Remover este produto?')) return;
  const before = products.length;
  products = products.filter(p => p.id !== id);
  const after = products.length;
  console.log('[DELETE]', before, '→', after, 'products');
  saveToStorage();
  renderList();
  showToast('Produto removido! 🗑️');
}

function resetForm() {
  editingId = null;
  document.getElementById('productForm').reset();
  document.getElementById('imagesList').innerHTML = '';
  imageCount = 0;
  addImageField();
}

function editProduct(id) {
  const p = products.find(pr => pr.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('prodName').value = p.name;
  document.getElementById('prodCategory').value = p.category;
  document.getElementById('prodOriginalPrice').value = p.originalPrice || '';
  document.getElementById('prodPrice').value = p.price;
  document.getElementById('prodLink').value = p.link;

  document.getElementById('imagesList').innerHTML = '';
  imageCount = 0;
  (p.images || []).forEach(url => addImageField(url));
  if (!p.images || !p.images.length) addImageField();

  document.getElementById('prodName').scrollIntoView({ behavior: 'smooth' });
}

function renderList() {
  const list = document.getElementById('adminProductList');
  document.getElementById('prodCount').textContent = products.length;

  if (!products.length) {
    list.innerHTML = '<p style="color:#aaa;text-align:center;padding:24px">Nenhum produto cadastrado.</p>';
    return;
  }

  list.innerHTML = products.map(p => `
    <div class="admin-item">
      <img src="${p.images?.[0] || 'https://via.placeholder.com/60x60'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/60x60'"/>
      <div class="admin-item-info">
        <div class="name">${p.name}</div>
        <div class="meta">R$ ${Number(p.price).toFixed(2).replace('.',',')} · ${p.category}</div>
      </div>
      <div class="admin-item-actions">
        <button class="btn-edit" onclick="editProduct(${p.id})"><i class="fas fa-pen"></i></button>
        <button class="btn-delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
      </div>
    </div>
  `).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;z-index:9999';
  setTimeout(() => t.style.display = 'none', 2500);
}

// Initialize
if (!products.length) {
  products = [{
    id: Date.now(),
    name: 'Fone Bluetooth (EXEMPLO)',
    category: 'eletronicos',
    price: 49.90,
    originalPrice: 89.90,
    link: 'https://s.shopee.com.br/',
    images: ['https://via.placeholder.com/300x300?text=Fone']
  }];
  saveToStorage();
}
addImageField();
renderList();
  </script>
</body>
</html>
